<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Convites{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
        }

        /* Navbar */
        .navbar {
            background: #2563eb;
            padding: 15px 30px;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .container {
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        Sistema de Convites
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>

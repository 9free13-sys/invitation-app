<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kixanu{% endblock %}</title>

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-soft: #dbeafe;
            --dark: #0f172a;
            --dark-soft: #1e293b;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --card: #ffffff;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
            --radius-lg: 22px;
            --radius-md: 14px;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 8px 20px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        a {
            color: inherit;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 14px 28px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            white-space: nowrap;
            letter-spacing: -0.2px;
        }

        .logo-mark {
            font-size: 22px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s ease;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .cta-btn {
            background: white;
            color: var(--primary);
        }

        .cta-btn:hover {
            background: #eff6ff;
        }

        .ghost-btn {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-color: rgba(255, 255, 255, 0.22);
        }

        .ghost-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .notification-btn {
            position: relative;
        }

        .notification-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            border-radius: 999px;
            background: var(--danger);
            color: white;
            font-size: 12px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        input,
        select,
        textarea,
        button {
            font-family: inherit;
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 12px 14px;
            }

            .nav-container {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-links {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .nav-link-btn {
                width: 100%;
            }

            .container {
                padding: 18px 12px 28px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-mark">🎉</span>
                <span>kixanu</span>
            </a>

            <div class="nav-links">
                <a href="/create/" class="nav-link-btn cta-btn">Criar convite</a>

                {% if request.user.is_authenticated %}
                    <a href="{% url 'notification_list' %}" class="nav-link-btn ghost-btn notification-btn">
                        Notificações
                        {% if unread_notifications_count > 0 %}
                            <span class="notification-badge">{{ unread_notifications_count }}</span>
                        {% endif %}
                    </a>
                    <a href="/profile/" class="nav-link-btn ghost-btn">Perfil</a>
                    <a href="/logout/" class="nav-link-btn ghost-btn">Sair</a>
                {% else %}
                    <a href="/login/" class="nav-link-btn ghost-btn">Entrar</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InvitePro{% endblock %}</title>

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --dark: #0f172a;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --card: #ffffff;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
            --radius-lg: 22px;
            --radius-md: 14px;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        a {
            color: inherit;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 14px 28px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            white-space: nowrap;
        }

        .logo-mark {
            font-size: 22px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s ease;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .cta-btn {
            background: white;
            color: var(--primary);
        }

        .cta-btn:hover {
            background: #eff6ff;
            transform: translateY(-1px);
        }

        .ghost-btn {
            background: rgba(255,255,255,0.08);
            color: white;
            border-color: rgba(255,255,255,0.22);
        }

        .ghost-btn:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .app-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .app-section-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
            margin: 0 0 10px 0;
        }

        .app-section-subtitle {
            font-size: 16px;
            color: var(--muted);
            line-height: 1.5;
            margin: 0;
        }

        .btn-primary,
        .btn-dark,
        .btn-light {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 12px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-dark {
            background: var(--dark);
            color: white;
        }

        .btn-dark:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .btn-light {
            background: white;
            color: var(--text);
            border-color: var(--border);
        }

        .btn-light:hover {
            background: #f8fafc;
        }

        input, select, textarea {
            font-family: inherit;
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 12px 14px;
            }

            .nav-container {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-links {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .nav-link-btn {
                width: 100%;
            }

            .logo {
                font-size: 17px;
            }

            .container {
                padding: 18px 12px 28px;
            }

            .app-section-title {
                font-size: 24px;
            }

            .app-section-subtitle {
                font-size: 14px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-mark">🎉</span>
                <span>InvitePro</span>
            </a>

            <div class="nav-links">
                <a href="/create/" class="nav-link-btn cta-btn">Criar meu convite agora</a>

                {% if request.user.is_authenticated %}
                    <a href="/logout/" class="nav-link-btn ghost-btn">Sair</a>
                {% else %}
                    <a href="/login/" class="nav-link-btn ghost-btn">Entrar</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>

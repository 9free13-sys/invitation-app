<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Convites{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
        }

    .cta-btn {
        background: white;
        color: #2563eb !important;
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 700;
        margin-left: 20px;
        display: inline-block;
    }

    .logout-btn {
        background: transparent;
        color: white !important;
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 700;
        margin-left: 12px;
        display: inline-block;
        border: 1px solid rgba(255,255,255,0.35);
    }

    .logout-btn:hover {
        background: rgba(255,255,255,0.12);
        opacity: 1;
}


        .cta-btn:hover {
        opacity: 1;
        background: #eff6ff;
    }

        .navbar {
            background: #2563eb;
            padding: 15px 30px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        .container {
            padding: 30px;
        }

@media (max-width: 700px) {
    .navbar {
        padding: 10px 12px;
    }

    .nav-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
    }

    .logo {
        font-size: 16px;
        white-space: nowrap;
    }

    .nav-links {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .nav-links a {
        margin-left: 0;
        box-sizing: border-box;
    }

    .cta-btn,
    .logout-btn {
        display: block;
        width: 100%;
        text-align: center;
        padding: 12px 14px;
        font-size: 12px;
        border-radius: 12px;
        white-space: nowrap;
        margin: 0;
    }
}

    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <span class="logo">🎉 InvitePro</span>

        <div class="nav-links">
            <a href="/create/" class="cta-btn">Criar meu convite agora</a>

            {% if request.user.is_authenticated %}
                <a href="/logout/" class="logout-btn">Sair</a>
            {% else %}
                <a href="/login/" class="logout-btn">Entrar</a>
            {% endif %}
        </div>
    </div>
</div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>

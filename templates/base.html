<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Convites{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
        }

        .navbar {
            background: #2563eb;
            padding: 15px 30px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        .container {
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-container">
            <span class="logo">🎉 InvitePro</span>

            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/admin/">Admin</a>
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>

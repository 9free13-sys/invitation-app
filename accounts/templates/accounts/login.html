{% extends "base.html" %}

{% block title %}Entrar{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        max-width: 480px;
        margin: 60px auto;
        padding: 0 16px;
    }

    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        box-sizing: border-box;
    }

    .auth-card h1 {
        margin-top: 0;
        margin-bottom: 10px;
        text-align: center;
        color: #0f172a;
    }

    .auth-card p {
        text-align: center;
        color: #64748b;
        margin-bottom: 25px;
        line-height: 1.5;
    }

    form {
        width: 100%;
    }

    form p {
        margin-bottom: 14px;
    }

    form label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #334155;
    }

    form input {
        display: block;
        width: 100%;
        max-width: 100%;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 15px;
        box-sizing: border-box;
    }

    ul.errorlist {
        color: #b91c1c;
        font-size: 14px;
        margin: 0 0 8px 0;
        padding-left: 18px;
    }

    .submit-btn {
        display: block;
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
        box-sizing: border-box;
    }

    .submit-btn:hover {
        background: #1d4ed8;
    }

    .bottom-link {
        text-align: center;
        margin-top: 18px;
    }

    .bottom-link span {
        color: #64748b;
    }

    .bottom-link a {
        color: #2563eb;
        font-weight: 700;
        text-decoration: none;
        margin-left: 6px;
    }

    @media (max-width: 700px) {
        .auth-wrapper {
            margin: 20px auto;
            padding: 0 12px;
        }

        .auth-card {
            padding: 22px 18px;
            border-radius: 18px;
        }

        .auth-card h1 {
            font-size: 28px;
        }

        .auth-card p {
            font-size: 14px;
            margin-bottom: 18px;
        }

        form input,
        .submit-btn {
            font-size: 15px;
        }

        .bottom-link {
            font-size: 14px;
        }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Entrar</h1>
        <p>Faça login para gerir os seus eventos e convites.</p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="submit-btn">Entrar</button>
        </form>

        <div class="bottom-link">
            <span>Ainda não tem conta?</span>
            <a href="/register/">Criar conta</a>
        </div>
    </div>
</div>
{% endblock %}

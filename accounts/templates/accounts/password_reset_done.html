{% extends "base.html" %}

{% block title %}Email enviado | Kixanu{% endblock %}

{% block content %}
<style>
    .auth-page {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        padding: 34px 28px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        text-align: center;
    }

    .auth-title {
        margin: 0 0 12px 0;
        font-size: 34px;
        font-weight: 800;
        color: #0f172a;
    }

    .auth-subtitle {
        margin: 0 0 24px 0;
        font-size: 15px;
        line-height: 1.7;
        color: #64748b;
    }

    .auth-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 8px;
    }

    .btn-primary,
    .btn-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 14px;
        text-decoration: none;
        font-size: 15px;
        font-weight: 700;
        transition: 0.2s ease;
    }

    .btn-primary {
        background: #2563eb;
        color: white;
        border: none;
    }

    .btn-primary:hover {
        background: #1d4ed8;
    }

    .btn-secondary {
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
    }

    .btn-secondary:hover {
        background: #dbeafe;
    }
</style>

<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Verifica o teu email</h1>
        <p class="auth-subtitle">
            Se existir uma conta com esse email, enviámos um link para redefinir a palavra-passe.
        </p>

        <div class="auth-actions">
            <a href="{% url 'password_reset' %}" class="btn-primary">Reenviar email</a>
            <a href="{% url 'login' %}" class="btn-secondary">Voltar ao login</a>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Palavra-passe alterada | Kixanu{% endblock %}

{% block content %}
<style>
    .auth-page {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        padding: 34px 28px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        text-align: center;
    }

    .auth-title {
        margin: 0 0 12px 0;
        font-size: 34px;
        font-weight: 800;
        color: #0f172a;
    }

    .auth-subtitle {
        margin: 0 0 20px;
        font-size: 15px;
        line-height: 1.7;
        color: #64748b;
    }

    .btn-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 12px 18px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        font-size: 15px;
        background: #2563eb;
        color: white;
    }
</style>

<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Tudo certo</h1>
        <p class="auth-subtitle">
            A tua palavra-passe foi alterada com sucesso.
        </p>
        <a href="{% url 'login' %}" class="btn-link">Ir para o login</a>
    </div>
</div>
{% endblock %}

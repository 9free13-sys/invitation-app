{% extends "base.html" %}

{% block title %}Alterar palavra-passe{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        max-width: 520px;
        margin: 40px auto;
    }

    .auth-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        padding: 36px 32px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 24px;
    }

    .auth-badge {
        width: 60px;
        height: 60px;
        margin: 0 auto 16px;
        border-radius: 18px;
        background: linear-gradient(135deg, #dbeafe, #eff6ff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
    }

    .auth-title {
        margin: 0 0 10px 0;
        font-size: 32px;
        font-weight: 800;
        color: #0f172a;
    }

    .auth-subtitle {
        margin: 0;
        font-size: 15px;
        color: #64748b;
        line-height: 1.5;
    }

    form p {
        margin: 0 0 16px 0;
    }

    form label {
        display: block;
        margin-bottom: 7px;
        font-size: 14px;
        font-weight: 700;
        color: #334155;
    }

    form input {
        display: block;
        width: 100%;
        max-width: 100%;
        padding: 14px 15px;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        font-size: 15px;
        background: #f8fafc;
        box-sizing: border-box;
        outline: none;
        transition: 0.2s ease;
    }

    form input:focus {
        border-color: #2563eb;
        background: white;
        box-shadow: 0 0 0 4px rgba(37,99,235,0.10);
    }

    .helptext {
        display: block;
        margin-top: 6px;
        color: #64748b;
        font-size: 13px;
        line-height: 1.4;
    }

    ul.errorlist {
        color: #b91c1c;
        font-size: 14px;
        margin: 0 0 8px 0;
        padding-left: 18px;
    }

    .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
    }

    .submit-btn,
    .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 14px 18px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        box-sizing: border-box;
    }

    .submit-btn {
        border: none;
        background: #2563eb;
        color: white;
        cursor: pointer;
    }

    .submit-btn:hover {
        background: #1d4ed8;
    }

    .back-btn {
        background: #0f172a;
        color: white;
    }

    .back-btn:hover {
        opacity: 0.95;
    }

    @media (max-width: 700px) {
        .auth-wrapper {
            margin: 16px auto;
            max-width: 100%;
        }

        .auth-card {
            padding: 24px 18px;
            border-radius: 18px;
        }

        .auth-title {
            font-size: 28px;
        }

        .auth-subtitle {
            font-size: 14px;
        }

        .actions {
            flex-direction: column;
        }

        .submit-btn,
        .back-btn {
            width: 100%;
        }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-badge">🔑</div>
            <h1 class="auth-title">Alterar palavra-passe</h1>
            <p class="auth-subtitle">Atualize a sua palavra-passe para manter a conta segura.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="actions">
                <button type="submit" class="submit-btn">Guardar nova palavra-passe</button>
                <a href="/profile/" class="back-btn">Voltar ao perfil</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

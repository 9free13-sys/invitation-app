<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convites</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 42px;
            color: #1e293b;
        }

        .header p {
            margin-top: 10px;
            color: #64748b;
            font-size: 18px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 35px;
        }

        .stat-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-box h3 {
            margin: 0;
            font-size: 34px;
            color: #1d4ed8;
        }

        .stat-box p {
            margin: 8px 0 0 0;
            color: #475569;
            font-size: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .btn {
            display: block;
            text-align: center;
            padding: 16px;
            background: #1e40af;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.2s ease;
            box-shadow: 0 8px 18px rgba(30, 64, 175, 0.20);
        }

        .btn:hover {
            background: #2563eb;
            transform: translateY(-3px) scale(1.02);
        }
        .btn:active {
             transform: scale(0.97);
        }
        .btn.secondary {
            background: #0f172a;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.20);
        }

        .btn.secondary:hover {
            background: #1e293b;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 32px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .buttons {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎉 Sistema de Convites</h1>
            <p>Gestão de eventos, convidados e confirmações</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>{{ total_events }}</h3>
                <p>Eventos</p>
            </div>

            <div class="stat-box">
                <h3>{{ total_guests }}</h3>
                <p>Convidados</p>
            </div>

            <div class="stat-box">
                <h3>{{ confirmed_guests }}</h3>
                <p>Confirmados</p>
            </div>

            <div class="stat-box">
                <h3>{{ unconfirmed_guests }}</h3>
                <p>Não confirmados</p>
            </div>
        </div>

        <div class="buttons">
        <a href="/admin/" class="btn secondary">⚙️ Admin</a>
        <a href="/events/" class="btn">📅 Eventos</a>
        <a href="/guests/" class="btn">👥 Convidados</a>
        <a href="/events/" class="btn">✉️ Convites</a></div>
    </div>

</body>
</html>

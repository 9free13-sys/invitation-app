<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convites</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 42px;
            color: #1e293b;
        }

        .header p {
            margin-top: 10px;
            color: #64748b;
            font-size: 18px;
        }

            .stat-box {
        background: white;
        padding: 20px;
        border-radius: 14px;
        text-align: center;
        width: 150px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        transition: 0.3s;
    }

    .stat-box:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }

    .stat-number {
        font-size: 28px;
        font-weight: bold;
        color: #2563eb;
    }

    .stat-label {
        font-size: 14px;
        color: #6b7280;
    }

        .main-btn {
    display: inline-block;
    padding: 16px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    text-align: center;
    color: white;
    transition: 0.3s;
}

.btn-dark {
    background: #0f172a;
}

.btn-blue {
    background: #2563eb;
}

.main-btn:hover {
    transform: translateY(-3px);
    opacity: 0.9;
}

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 32px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .buttons {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎉 Sistema de Convites</h1>
            <p>Gestão de eventos, convidados e confirmações</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>{{ total_events }}</h3>
                <p>Eventos</p>
            </div>

            <div class="stat-box">
                <h3>{{ total_guests }}</h3>
                <p>Convidados</p>
            </div>

            <div class="stat-box">
                <h3>{{ confirmed_guests }}</h3>
                <p>Confirmados</p>
            </div>

            <div class="stat-box">
                <h3>{{ unconfirmed_guests }}</h3>
                <p>Não confirmados</p>
            </div>
        </div>

        <div class="buttons">
        <a href="/admin/" class="main-btn btn-dark">⚙️ Admin</a>
        <a href="/events/" class="main-btn btn-blue">📅 Eventos</a>
        <a href="/guests/" class="main-btn btn-blue">👥 Convidados</a>
        <a href="/invitations/" class="main-btn btn-blue">✉️ Convites</a> </div>

</body>
</html>
